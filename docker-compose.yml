version: '3.8'

services:
  # Infinity Embedding & Reranking Server
  infinity:
    image: michaelf34/infinity:latest-cpu
    container_name: infinity_server
    ports:
      - "7997:7997"
    volumes:
      - infinity_cache:/app/.cache
    command: >
      v2 
      --model-id BAAI/bge-small-en-v1.5 --engine optimum
      --model-id jinaai/jina-clip-v1 --engine torch
      --model-id BAAI/bge-reranker-base --engine torch
    # If you have an NVIDIA GPU, uncomment the following lines to enable GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Qdrant Vector Database (local)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    # Qdrant has a built-in dashboard at: http://localhost:6333/dashboard

volumes:
  infinity_cache:
  qdrant_data:
